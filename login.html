<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Login - MyRead</title>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--light);">
        <div class="card" style="width: 400px;">
            <h2 id="formTitle">Sign In</h2>
            <p id="formSub" style="color: var(--gray); margin-bottom: 20px;">Masukkan akun Anda</p>
            
            <form id="authForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="pass" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Masuk Sekarang</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 14px; text-align: center;">
                Belum punya akun? <a href="#" onclick="toggleAuth()" style="color: var(--primary); font-weight: bold;">Daftar</a>
            </p>
        </div>
    </div>

    <script>
        let isLogin = true;
        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Sign In" : "Sign Up";
            document.getElementById('formSub').innerText = isLogin ? "Masukkan akun Anda" : "Buat akun baru Anda";
        }
        document.getElementById('authForm').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>
