<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Auth Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <nav>
    <a onclick="showSignIn()">Sign in</a>
  </nav>

  <div class="wrapper">
    <div class="container animate__animated animate__fadeIn">
      <div id="signin" class="form">
        <h2>Sign In</h2>
        <input id="loginEmail" placeholder="Email">
        <input id="loginPassword" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="loginMsg" class="message"></div>
        <div class="switch" onclick="toggle('signup')">Don't have an account? Sign Up</div>
      </div>

      <div id="signup" class="form active">
        <h2>Sign Up</h2>
        <input id="regName" placeholder="Name">
        <input id="regEmail" placeholder="Email">
        <input id="regPass" type="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <div id="registerMsg" class="message"></div>
        <div class="switch" onclick="toggle('signin')">Already have an account? Sign In</div>
      </div>
    </div>
  </div>

</body>

<script src="script.js"></script>

</html>
